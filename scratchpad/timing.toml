# Throwaway config for GPU-training-speed A/B (old vs new per-step body). Loads the iter36 champion,
# WS mode, users 1-100, validates/checkpoints every 50 steps so "Steps per second" prints fast.
# Saves to a scratch folder (disposable). RUN WITH RWKV_NO_JIT=1 (JIT is broken in torch 2.12.1+cu130).
TRAIN_USERS_START = 1
TRAIN_USERS_END = 100

VALIDATE_USERS_START = 101
VALIDATE_USERS_END = 110

TRAIN_DATASET_LMDB_PATH = "train_db"
TRAIN_DATASET_LMDB_SIZE = 4_000_000_000
VALIDATE_DATASET_LMDB_PATH = "test_db"
VALIDATE_DATASET_LMDB_SIZE = 8_000_000_000
LABEL_FILTER_LMDB_PATH = "label_filter_db"
LABEL_FILTER_LMDB_SIZE = 2_000_000_000

NUM_FETCH_PROCESSES = 7
MAX_TRAIN_GLOBAL_LEN = 20000

TRAIN_MODE = "WS"
STEP_OFFSET = 1
WARMUP_STEPS = 50
EPOCHS = 6
VALIDATE_EVERY = 50
PEAK_LR = 7e-4

LOAD_MODEL = true
LOAD_MODEL_FOLDER = "pretrain/rwkv/opt_iter36"
LOAD_MODEL_NAME = "rwkv_iter36_558"
SAVE_MODEL_FOLDER = "scratchpad/opt_timing"
SAVE_MODEL_PREFIX = "timing"
DEVICE = "cuda"
DTYPE = "bfloat16"

USE_WANDB = false
WANDB_PROJECT_NAME = "rwkv"
WANDB_RESUME = false
WANDB_RESUME_ID = ""

# Route-R: WS train champion arch on the SMALL-CHUNK db (8192-review chunks, B~4 at MAX=66000).
# Mirrors rebase_66k_ws.toml exactly EXCEPT TRAIN_DATASET_LMDB_PATH + save target. 6 epochs (160 groups
# -> 960 steps). VALIDATE_EVERY=960 -> validates/saves only at step 50 + final (960). Final ckpt =
# scratchpad/sc8k_ws/sc8kws_960.pth. Compare speed + 101-200 logloss vs the 65536-chunk base run.
TRAIN_USERS_START = 1
TRAIN_USERS_END = 100
VALIDATE_USERS_START = 101
VALIDATE_USERS_END = 110

TRAIN_DATASET_LMDB_PATH = "train_db_sc8k"
TRAIN_DATASET_LMDB_SIZE = 4_000_000_000
VALIDATE_DATASET_LMDB_PATH = "test_db"
VALIDATE_DATASET_LMDB_SIZE = 8_000_000_000
LABEL_FILTER_LMDB_PATH = "label_filter_db"
LABEL_FILTER_LMDB_SIZE = 2_000_000_000

NUM_FETCH_PROCESSES = 7
MAX_TRAIN_GLOBAL_LEN = 66000

TRAIN_MODE = "WS"
STEP_OFFSET = 1
WARMUP_STEPS = 200
EPOCHS = 6
VALIDATE_EVERY = 960
PEAK_LR = 7e-4

LOAD_MODEL = false
SAVE_MODEL_FOLDER = "scratchpad/sc8k_ws"
SAVE_MODEL_PREFIX = "sc8kws"
DEVICE = "cuda"
DTYPE = "bfloat16"

USE_WANDB = false
WANDB_PROJECT_NAME = "rwkv"
WANDB_RESUME = false
WANDB_RESUME_ID = ""

# TRACK 2 A3: GRU-faithful curve head (RWKV_GRU_HEAD=2; srs-benchmark models/gru.py class
# GRU) -- three tiny linears off the head_w trunk predict per-row w/S/decay for N=2 power
# curves R(t) = sum w_i (1+t/S_i)^(-d_i), replacing the 128-basis fixed-stability mixture
# AND stripping the dead ahead head (1x1 dummies). Params: 2,126,224 on the A1 arch
# (-194,292 = -8.37%) or 2,010,120 on the A2 deck3 arch (-8.8%) -- arch chosen at launch
# per A2's verdict (RWKV_ARCH_MODULE in run_track2_a3.cmd). Recipe otherwise identical to
# A1/A2: 1 ep WS + 0.25 ep decay, seed 1234, PLAIN bf16, JIT on, MAX=32768 (ALL track-2
# runs share this MAX for pairing). RWKV_NO_AHEAD_RESIDUAL=1 mandatory recipe (the GRU
# head forces it structurally anyway). Gate: ratio 100k*dLL/dparams <= 0.0001 BOTH modes
# vs the current track-2 champion (subject to Andrew's no-residual re-anchor decision).

# Run-to-run variance probe: from-scratch WS (champion arch), users 1-100, 18 epochs (~558 steps),
# CURRENT code (stochastic augmentation, no torch-determinism) -- i.e. the real tuner objective's
# training. Saves only the WS-final checkpoint (VALIDATE_EVERY high -> saves at step==total). The
# driver runs this twice + evals each on 101-200 to measure the by-user-mean LogLoss spread.
TRAIN_USERS_START = 1
TRAIN_USERS_END = 100

VALIDATE_USERS_START = 101
VALIDATE_USERS_END = 110

TRAIN_DATASET_LMDB_PATH = "train_db"
TRAIN_DATASET_LMDB_SIZE = 4_000_000_000
VALIDATE_DATASET_LMDB_PATH = "test_db"
VALIDATE_DATASET_LMDB_SIZE = 8_000_000_000
LABEL_FILTER_LMDB_PATH = "label_filter_db"
LABEL_FILTER_LMDB_SIZE = 2_000_000_000

NUM_FETCH_PROCESSES = 7
MAX_TRAIN_GLOBAL_LEN = 20000

TRAIN_MODE = "WS"
STEP_OFFSET = 1
WARMUP_STEPS = 50
EPOCHS = 18
VALIDATE_EVERY = 600
PEAK_LR = 7e-4

LOAD_MODEL = false
SAVE_MODEL_FOLDER = "scratchpad/var_run"
SAVE_MODEL_PREFIX = "varws"
DEVICE = "cuda"
DTYPE = "bfloat16"

USE_WANDB = false
WANDB_PROJECT_NAME = "rwkv"
WANDB_RESUME = false
WANDB_RESUME_ID = ""

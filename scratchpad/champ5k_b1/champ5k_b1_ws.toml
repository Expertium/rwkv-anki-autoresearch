# BUDGET EXPERIMENT champ5k_b1 (Andrew 2026-07-08): same recipe as champ5k_r1 but HALF the
# training budget -- WS 1 epoch (6554 steps) instead of 2; decay keeps ratio 0.25 (= 0.25 ep).
# Motivation: the WS loss plateaus after ~2k steps; if the full-eval finals land ~equal to
# champ5k_r1 (0.306572/0.278323), the halved budget becomes the standard (runs ~3h not ~6h).
TRAIN_USERS_START = 1
TRAIN_USERS_END = 5000
VALIDATE_USERS_START = 5001
VALIDATE_USERS_END = 5010

TRAIN_DATASET_LMDB_PATH = "train_db_5k_h1"
TRAIN_DATASET_LMDB_SIZE = 400_000_000_000
VALIDATE_DATASET_LMDB_PATH = "F:/rwkv_lmdb/test_db_5k"
VALIDATE_DATASET_LMDB_SIZE = 250_000_000_000
LABEL_FILTER_LMDB_PATH = "label_filter_db"
LABEL_FILTER_LMDB_SIZE = 40_000_000_000

NUM_FETCH_PROCESSES = 4
MAX_TRAIN_GLOBAL_LEN = 110000

TRAIN_MODE = "WS"
STEP_OFFSET = 1
WARMUP_STEPS = 200
EPOCHS = 1
VALIDATE_EVERY = 500
PEAK_LR = 1e-3

LOAD_MODEL = false
LOAD_MODEL_FOLDER = "reference"
LOAD_MODEL_NAME = "unused"
SAVE_MODEL_FOLDER = "scratchpad/champ5k_b1"
SAVE_MODEL_PREFIX = "champ5kb1ws"
DEVICE = "cuda"
DTYPE = "bfloat16"

USE_WANDB = false
WANDB_PROJECT_NAME = "rwkv"
WANDB_RESUME = false
WANDB_RESUME_ID = ""

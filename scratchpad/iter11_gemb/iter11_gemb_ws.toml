# RESEARCH PHASE iter 11: iter11_gemb = dedicated additive GRADE EMBEDDING (Andrew's idea,
# 2026-07-13). The grade one-hot already gets an implicit embedding via features2card's first
# Linear, so a literal one-hot->embedding swap is a no-op; the real change is a 4 x d_model
# ZERO-INIT bypass added AFTER the shared MLP (x = features2card(f) + onehot @ E) -- grade
# information no longer competes with the other 88 dims for the fc->32 squeeze. Matmul form =>
# ahead-mode query rows (all-zero one-hot) contribute exactly zero. +128 params (193,852).
# Hook: RWKV_GRADE_EMB=1 in srs_model.py (default off = byte-identical). Otherwise the EXACT
# champion recipe: champion arch (H=2/K=16, [1,4,3,3,3]), champion HPs, 1-ep WS + 0.25-ep decay,
# q72u learnable cbs, seed 1234. Gate: >=0.0003 BOTH modes + p<0.0001 both vs champ5k_b1.
# NOTE margin < ~0.0005 => seed-pair before acting.

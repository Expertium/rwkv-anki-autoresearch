# empty_cache A/B: short WS (2 epochs ~= 320 steps) on train_db_sc8k, NO mid validation
# (VALIDATE_EVERY huge). Run twice (RWKV_EMPTY_CACHE_EVERY=1 baseline vs =0 off) -> compare
# train_elapsed_min + steps/s at the final step. empty_cache is numerics-neutral, so this only
# measures speed + checks for OOM. Final ckpt is throwaway.
TRAIN_USERS_START = 1
TRAIN_USERS_END = 100
VALIDATE_USERS_START = 101
VALIDATE_USERS_END = 102

TRAIN_DATASET_LMDB_PATH = "train_db_sc8k"
TRAIN_DATASET_LMDB_SIZE = 4_000_000_000
VALIDATE_DATASET_LMDB_PATH = "test_db"
VALIDATE_DATASET_LMDB_SIZE = 8_000_000_000
LABEL_FILTER_LMDB_PATH = "label_filter_db"
LABEL_FILTER_LMDB_SIZE = 2_000_000_000

NUM_FETCH_PROCESSES = 7
MAX_TRAIN_GLOBAL_LEN = 66000

TRAIN_MODE = "WS"
STEP_OFFSET = 1
WARMUP_STEPS = 200
EPOCHS = 2
VALIDATE_EVERY = 100000
PEAK_LR = 7e-4

LOAD_MODEL = false
SAVE_MODEL_FOLDER = "scratchpad/ectest"
SAVE_MODEL_PREFIX = "ectest"
DEVICE = "cuda"
DTYPE = "bfloat16"

USE_WANDB = false
WANDB_PROJECT_NAME = "rwkv"
WANDB_RESUME = false
WANDB_RESUME_ID = ""

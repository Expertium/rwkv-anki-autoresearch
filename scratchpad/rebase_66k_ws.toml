# Re-baseline the champion at FULL data coverage: from-scratch WS, users 1-100, champion arch,
# MAX_TRAIN_GLOBAL_LEN=66000 (100% of batches -> 170 groups, vs 4.7% at 20000). 6 epochs (~1020 steps)
# = ~6 full-data passes (the 20000 champion saw ~0.85). The driver runs this twice (variance) + decays
# run1 to a champion. SAVE_MODEL_FOLDER overridden per run by the driver.
TRAIN_USERS_START = 1
TRAIN_USERS_END = 100

VALIDATE_USERS_START = 101
VALIDATE_USERS_END = 110

TRAIN_DATASET_LMDB_PATH = "train_db"
TRAIN_DATASET_LMDB_SIZE = 4_000_000_000
VALIDATE_DATASET_LMDB_PATH = "test_db"
VALIDATE_DATASET_LMDB_SIZE = 8_000_000_000
LABEL_FILTER_LMDB_PATH = "label_filter_db"
LABEL_FILTER_LMDB_SIZE = 2_000_000_000

NUM_FETCH_PROCESSES = 7
MAX_TRAIN_GLOBAL_LEN = 66000

TRAIN_MODE = "WS"
STEP_OFFSET = 1
WARMUP_STEPS = 200
EPOCHS = 6
VALIDATE_EVERY = 1020
PEAK_LR = 7e-4

LOAD_MODEL = false
SAVE_MODEL_FOLDER = "scratchpad/rebase_run"
SAVE_MODEL_PREFIX = "rebase"
DEVICE = "cuda"
DTYPE = "bfloat16"

USE_WANDB = false
WANDB_PROJECT_NAME = "rwkv"
WANDB_RESUME = false
WANDB_RESUME_ID = ""
